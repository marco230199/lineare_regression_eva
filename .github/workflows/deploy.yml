name: Website veröffentlichen

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Website bauen
        run: npm run build

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Build hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Website veröffentlichen
        uses: actions/deploy-pages@v4